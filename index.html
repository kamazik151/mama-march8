<!DOCTYPE html><html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для мами ❤️</title>
<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  height:100vh;
  margin:0;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}.container{ background:white; padding:40px; border-radius:25px; box-shadow:0 15px 40px rgba(0,0,0,0.25); max-width:520px; position:relative; z-index:2; animation:fadeIn 1s ease; }

h1{ margin-top:0; }

button{ padding:14px 28px; font-size:18px; margin:12px; border:none; border-radius:12px; cursor:pointer; background:#ff6b81; color:white; transition:transform .2s, background .2s, box-shadow .2s; box-shadow:0 5px 15px rgba(0,0,0,0.2); }

button:hover{ background:#ff4757; transform:scale(1.1); }

.heart-svg{ width:120px; margin:auto; margin-top:20px; }

.heart-path{ fill:none; stroke:#ff4d6d; stroke-width:4; stroke-dasharray:400; stroke-dashoffset:400; animation:draw 3s ease forwards, beat 1s infinite 3s; }

@keyframes draw{ to{stroke-dashoffset:0} }

@keyframes beat{ 0%{transform:scale(1);} 50%{transform:scale(1.15);} 100%{transform:scale(1);} }

@keyframes fadeIn{ from{opacity:0; transform:translateY(25px);} to{opacity:1; transform:translateY(0);} }

/* падаючі сердечка і квіти */ .falling{ position:fixed; top:-10px; font-size:22px; animation:fall linear forwards; z-index:1; }

@keyframes fall{ to{ transform:translateY(110vh); opacity:0; } }

</style>
</head>
<body><audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3" type="audio/mpeg">
</audio><div class="container" id="screen1">
<h1>Мамо, ти готова? 😊</h1>
<button onclick="next1()">Так, звісно</button>
</div><div class="container" id="screen2" style="display:none;">
<h1>Точно готова? 😄</h1>
<button onclick="next2()">100%</button>
</div><div class="container" id="screen3" style="display:none;">
<h1>З 8 Березня, мамо! 🌸</h1>
<p>
Дякую тобі за любов, турботу і підтримку.<br>
Ти найкраща мама у світі! ❤️
</p><svg class="heart-svg" viewBox="0 0 32 29.6">
<path class="heart-path" d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4
c0,9.4,16,21.2,16,21.2s16-11.8,16-21.2C32,3.8,28.2,0,23.6,0z"/>
</svg></div><script>
function next1(){
 document.getElementById('screen1').style.display='none';
 document.getElementById('screen2').style.display='block';
}

function next2(){
 document.getElementById('screen2').style.display='none';
 document.getElementById('screen3').style.display='block';
 startEffects();
 document.getElementById('music').play();
}

function startEffects(){
 const icons=['❤️','🌸','💗','🌷'];
 setInterval(()=>{
  const el=document.createElement('div');
  el.className='falling';
  el.innerHTML=icons[Math.floor(Math.random()*icons.length)];
  el.style.left=Math.random()*100+'vw';
  el.style.animationDuration=(4+Math.random()*3)+'s';
  document.body.appendChild(el);

  setTimeout(()=>{
   el.remove();
  },7000);

 },300);
}
</script></body>
</html>
